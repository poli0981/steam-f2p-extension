<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=360">
    <link rel = "stylesheet" href = "../shared/theme.css">
    <link rel = "stylesheet" href = "popup.css">
</head>
<body>
<!-- ── Header ── -->
<header class = "popup-header">
    <div class = "flex items-center gap-sm">
        <svg
                class = "logo-icon" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor" stroke-width = "2"
                stroke-linecap = "round" stroke-linejoin = "round"
        >
            <path d = "M6 3h12l4 6-10 13L2 9z"/>
            <path d = "M12 22V8"/>
            <path d = "m2 9 10-1 10 1"/>
            <path d = "m6.5 3 5.5 5 5.5-5"/>
        </svg>
        <div>
            <h1 class = "popup-title">Steam F2P Tracker</h1>
            <span class = "popup-version" id = "version"></span>
        </div>
    </div>
    <div class = "flex items-center gap-sm">
        <span class = "status-dot" id = "statusDot" title = "GitHub connection status"></span>
    </div>
</header>

<!-- ── Detected Game Card ── -->
<section class = "popup-section" id = "detectedSection">
    <div class = "section-label">Current Page</div>
    <div class = "card detected-card" id = "detectedCard">
        <div class = "detected-loading" id = "detectedLoading">
            <span class = "text-muted text-sm">Checking page...</span>
        </div>
        <div class = "detected-content" id = "detectedContent" style = "display:none">
            <div class = "detected-row">
                <img class = "detected-thumb" id = "detectedThumb" src = "" alt = "">
                <div class = "detected-info">
                    <div class = "detected-name truncate" id = "detectedName"></div>
                    <div class = "detected-meta text-sm text-muted">
                        <span id = "detectedGenre"></span>
                        <span class = "detected-sep">·</span>
                        <span id = "detectedDev"></span>
                    </div>
                    <!-- New: extra info line (platforms, langs, publisher) -->
                    <div
                            class = "detected-extra text-xs text-muted" id = "detectedExtraInfo"
                            style = "display:none; margin-top:2px;"
                    ></div>
                    <div class = "detected-badges" id = "detectedBadges"></div>
                </div>
            </div>
            <!-- New: description preview -->
            <div
                    class = "detected-desc text-xs text-muted" id = "detectedDesc"
                    style = "display:none; margin-top:6px; line-height:1.4; opacity:0.8;"
            ></div>
            <div class = "detected-actions" style = "margin-top:8px; display:flex; gap:var(--space-sm);">
                <button class = "btn btn-success" id = "addBtn" style = "flex:1">
                    <svg
                            width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                            stroke-width = "2.5" stroke-linecap = "round"
                    >
                        <line x1 = "12" y1 = "5" x2 = "12" y2 = "19"/>
                        <line x1 = "5" y1 = "12" x2 = "19" y2 = "12"/>
                    </svg>
                    Add to Queue
                </button>
                <button class = "btn btn-ghost btn-sm" id = "scanBtn"
                        title = "Re-scan this page (no reload needed)">
                    <svg
                            width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                            stroke-width = "2" stroke-linecap = "round" stroke-linejoin = "round"
                    >
                        <polyline points = "23 4 23 10 17 10"/>
                        <polyline points = "1 20 1 14 7 14"/>
                        <path d = "M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    Scan
                </button>
            </div>
        </div>
        <div class = "detected-none" id = "detectedNone" style = "display:none">
            <span class = "text-muted text-sm">Navigate to a Steam game page to detect games.</span>
        </div>
        <div class = "detected-duplicate" id = "detectedDuplicate" style = "display:none">
            <span class = "text-sm" style = "color:var(--accent-yellow)">⚠ Already in queue or tracker</span>
        </div>
    </div>
</section>

<!-- ── Queue Summary ── -->
<section class = "popup-section">
    <div class = "section-label">Queue</div>
    <div class = "card queue-summary">
        <div class = "flex items-center justify-between">
            <div class = "flex items-center gap-sm">
                <svg
                        width = "16" height = "16" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                        stroke-width = "2" stroke-linecap = "round" stroke-linejoin = "round"
                >
                    <rect x = "3" y = "3" width = "7" height = "7"/>
                    <rect x = "14" y = "3" width = "7" height = "7"/>
                    <rect x = "3" y = "14" width = "7" height = "7"/>
                    <rect x = "14" y = "14" width = "7" height = "7"/>
                </svg>
                <span class = "queue-count">
                    <strong id = "queueCount">0</strong>
                    <span class = "text-muted">/ 150</span>
                </span>
            </div>
            <button class = "btn btn-primary btn-sm" id = "pushBtn" disabled>
                <svg
                        width = "12" height = "12" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                        stroke-width = "2.5" stroke-linecap = "round"
                >
                    <line x1 = "12" y1 = "19" x2 = "12" y2 = "5"/>
                    <polyline points = "5 12 12 5 19 12"/>
                </svg>
                Push
            </button>
        </div>
        <div class = "queue-bar">
            <div class = "queue-bar-fill" id = "queueBar"></div>
        </div>
    </div>
</section>

<!-- ── Quick Actions ── -->
<section class = "popup-section">
    <div class = "popup-actions">
        <button class = "btn btn-ghost btn-sm" id = "openQueueBtn">
            <svg
                    width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                    stroke-width = "2" stroke-linecap = "round"
            >
                <path d = "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points = "14 2 14 8 20 8"/>
                <line x1 = "16" y1 = "13" x2 = "8" y2 = "13"/>
                <line x1 = "16" y1 = "17" x2 = "8" y2 = "17"/>
            </svg>
            Queue
        </button>
        <button class = "btn btn-ghost btn-sm" id = "openSettingsBtn">
            <svg
                    width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                    stroke-width = "2" stroke-linecap = "round"
            >
                <circle cx = "12" cy = "12" r = "3"/>
                <path d = "M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
            Settings
        </button>
    </div>
</section>

<!-- ── Recent Activity ── -->
<section class = "popup-section popup-section-last">
    <div class = "section-label">Recent Activity</div>
    <div class = "activity-list" id = "activityList">
        <div class = "empty-state" style = "padding:12px">
            <span class = "text-muted text-xs">No recent activity</span>
        </div>
    </div>
</section>

<footer class="app-footer">
    <span>Copyright © 2026 poli0981 & contributor(s)</span>
    <span>Third-party: <a href="https://github.com/openpgpjs/openpgpjs">openpgp.js</a> (LGPL-3.0)</span>
</footer>

<script type = "module" src = "popup.js"></script>
</body>
</html>
