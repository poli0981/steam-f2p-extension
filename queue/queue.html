<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Queue – Steam F2P Tracker</title>
    <link rel = "stylesheet" href = "../shared/theme.css">
    <link rel = "stylesheet" href = "queue.css">
</head>
<body>
<div class = "page-container">
    <!-- ── Header ── -->
    <header class = "page-header">
        <div class = "flex items-center gap-md">
            <svg
                    class = "header-icon" width = "24" height = "24" viewBox = "0 0 24 24" fill = "none"
                    stroke = "currentColor"
                    stroke-width = "2" stroke-linecap = "round" stroke-linejoin = "round"
            >
                <rect x = "3" y = "3" width = "7" height = "7"/>
                <rect x = "14" y = "3" width = "7" height = "7"/>
                <rect x = "3" y = "14" width = "7" height = "7"/>
                <rect x = "14" y = "14" width = "7" height = "7"/>
            </svg>
            <div>
                <h1 class = "page-title">Queue</h1>
                <p class = "page-subtitle">
                    <span id = "queueCount">0</span> / 150 games pending
                </p>
            </div>
        </div>
        <div class = "flex items-center gap-sm">
            <button class = "btn btn-ghost btn-sm" id = "refreshBtn" title = "Refresh queue (Ctrl+R)">
                <svg
                        width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                        stroke-width = "2"
                        stroke-linecap = "round"
                >
                    <polyline points = "23 4 23 10 17 10"/>
                    <polyline points = "1 20 1 14 7 14"/>
                    <path d = "M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                Refresh
            </button>
            <button class = "btn btn-danger btn-sm" id = "clearAllBtn" disabled title = "Remove all games from queue">
                <svg
                        width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                        stroke-width = "2"
                        stroke-linecap = "round"
                >
                    <polyline points = "3 6 5 6 21 6"/>
                    <path d = "M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                Clear
            </button>
            <button class = "btn btn-primary btn-sm" id = "pushSelectedBtn" disabled
                    title = "Push only the checked entries">
                <svg
                        width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                        stroke-width = "2.5"
                        stroke-linecap = "round"
                >
                    <polyline points = "20 6 9 17 4 12"/>
                </svg>
                <span id = "pushSelectedLabel">Push Selected</span>
            </button>
            <button class = "btn btn-success btn-sm" id = "pushAllBtn" disabled>
                <svg
                        width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                        stroke-width = "2.5"
                        stroke-linecap = "round"
                >
                    <line x1 = "12" y1 = "19" x2 = "12" y2 = "5"/>
                    <polyline points = "5 12 12 5 19 12"/>
                </svg>
                Push All
            </button>
        </div>
    </header>

    <!-- ── Search bar ── -->
    <div class = "search-bar">
        <svg
                width = "14" height = "14" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                stroke-width = "2"
                stroke-linecap = "round"
        >
            <circle cx = "11" cy = "11" r = "8"/>
            <line x1 = "21" y1 = "21" x2 = "16.65" y2 = "16.65"/>
        </svg>
        <input class = "input search-input" type = "text" id = "searchInput" placeholder = "Search queue...">
    </div>

    <!-- ── Queue Grid ── -->
    <div class = "queue-grid" id = "queueGrid">
        <!-- Cards rendered by JS -->
    </div>

    <!-- ── Empty State ── -->
    <div class = "empty-state" id = "emptyState" style = "display:none">
        <svg
                width = "48" height = "48" viewBox = "0 0 24 24" fill = "none" stroke = "currentColor"
                stroke-width = "1.5"
                stroke-linecap = "round" stroke-linejoin = "round"
        >
            <rect x = "3" y = "3" width = "18" height = "18" rx = "2" ry = "2"/>
            <line x1 = "12" y1 = "8" x2 = "12" y2 = "16"/>
            <line x1 = "8" y1 = "12" x2 = "16" y2 = "12"/>
        </svg>
        <p>Queue is empty</p>
        <span class = "text-sm text-muted">Browse Steam store pages and click "Add to Queue" to get started.</span>
    </div>
</div>

<footer class="app-footer">
    <span>Copyright © 2026 poli0981 & contributor(s)</span>
    <span>Third-party: <a href="https://github.com/openpgpjs/openpgpjs">openpgp.js</a> (LGPL-3.0)</span>
</footer>

<script type = "module" src = "queue.js"></script>
</body>
</html>
