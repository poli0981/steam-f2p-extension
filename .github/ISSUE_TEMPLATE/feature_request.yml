name: "✨ Feature Request"
description: Suggest a new feature or improvement for the extension.
title: "[Feature] "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        **Before submitting, please check:**
        - [ ] I have searched existing issues and this feature has not been requested.
        - [ ] I have read the [Contributing guidelines](../../CONTRIBUTING.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature do you want? Be specific and direct.
      placeholder: "Add a button in the queue page to push only selected games instead of the entire queue."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why This Feature Is Needed
      description: What problem does this solve? What use case does it address?
      placeholder: "Sometimes I want to push only a few games while keeping others in the queue for review. Currently the only option is Push All."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area of the extension does this affect?
      options:
        - Detection (content script / Steam page parsing)
        - Queue management
        - Push / GitHub integration
        - GPG signing
        - Settings / Configuration
        - UI / UX
        - Logging / Debugging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Describe the expected behavior.
      placeholder: |
        - Add checkboxes to each game card in the queue page.
        - Add a "Push Selected" button next to "Push All".
        - Only checked games are pushed; unchecked games stay in queue.
    validations:
      required: false

  - type: textarea
    id: pseudocode
    attributes:
      label: Pseudocode / Technical Notes (optional)
      description: If you have implementation ideas, share them here.
      placeholder: |
        The push-handler already supports `opts.appids` for selective push:
        ```js
        await pushQueue({ appids: selectedAppIds });
        ```
        The queue page just needs UI to collect selected appids.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches? Why is your proposal better?
      placeholder: "Could also be done with a filter + push filtered, but explicit selection is more intuitive."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups / Screenshots (optional)
      description: Attach mockups, wireframes, or reference screenshots if applicable.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information.
    validations:
      required: false
