name: Notify Release Pipeline

on:
  workflow_run:
    # Narrowed from `["*"]` to release-related workflows. The previous wildcard
    # caused the notifier to trigger on every workflow completion in the repo,
    # most of which were irrelevant to the release pipeline and surfaced as
    # "Skipped" entries in the Actions UI.
    workflows:
      - "Release"
      - "Announce Release to Discord"
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  notify:
    uses: poli0981/.github/.github/workflows/notify-release-pipeline.yml@main
    secrets: inherit