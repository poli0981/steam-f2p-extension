#
# Release automation for Steam F2P Tracker.
#
# Trigger: push of any tag matching `v*.*.*`.
# Flow:
#   1. Checkout at the tag commit
#   2. Verify manifest.json `version` matches the tag (strip leading `v`)
#   3. Build the extension ZIP, excluding dev-only files
#   4. Create a GitHub release with the ZIP attached; the tag's annotation
#      message becomes the release body.
#
# Shipping a new version:
#   - Bump `manifest.json` "version", merge to main
#   - `git tag -s vX.Y.Z -m "release notes..."`
#   - `git push origin vX.Y.Z`
#   - This workflow does the rest.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Needed by softprops/action-gh-release to create the release.
permissions:
  contents: write

jobs:
  release:
    name: Build + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(jq -r .version manifest.json)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Manifest version matches tag: $MANIFEST_VERSION"

      - name: Build extension ZIP
        id: build
        run: |
          ZIP_NAME="steam-f2p-tracker-v${{ steps.version.outputs.version }}.zip"
          zip -r "$ZIP_NAME" . \
            -x '.git/*' '.github/*' '.idea/*' '.claude/*' \
                'CHANGELOG.md' 'CONTRIBUTING.md' 'CODE_OF_CONDUCT.md' \
                'SECURITY.md' 'REQUIREMENTS.md'
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "---- ZIP contents ----"
          unzip -l "$ZIP_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip_name }}
          fail_on_unmatched_files: true
